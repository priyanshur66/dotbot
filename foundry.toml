[profile.default]
src = 'backend/contracts'
out = 'out'
script = 'script'
libs = ['lib']
solc = '0.8.30'
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
  { access = "read-write", path = "./deployments" }
]
remappings = [
  'forge-std/=lib/forge-std/src/',
  '@openzeppelin/=backend/node_modules/@openzeppelin/'
]
